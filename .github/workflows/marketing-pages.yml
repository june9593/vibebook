name: vibebook · marketing site

# Build the marketing-site Astro project and publish it to GitHub Pages
# whenever main itself gets a marketing-site change. We deliberately gate
# on `branches: [main]` (not tags) so:
#   - Random feature/PR branches don't deploy half-shipped landing pages.
#   - GitHub Pages env's deployment-branch-policy (which only allows `main`)
#     and our trigger agree on the same ref — no env-policy mismatch.
# `paths:` further restricts deploys to actual marketing changes so a code
# commit on main doesn't redundantly rebuild and republish the static site.
#
# Setup steps for this repo:
#   1. Settings → Pages → Source: GitHub Actions
#   2. Land a marketing-site/** change on main (PR merge or direct push).
#
# The published URL is https://june9593.github.io/vibebook/.

on:
  push:
    branches: [main]
    paths:
      - "marketing-site/**"
      - ".github/workflows/marketing-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install marketing-site deps
        working-directory: marketing-site
        run: npm install --no-audit --no-fund

      - name: Build marketing-site
        working-directory: marketing-site
        env:
          # Project-page deploy → /vibebook/. CDN-canonical absolute URL.
          VIBEBOOK_PAGES_BASE: /vibebook/
          VIBEBOOK_PAGES_URL: https://june9593.github.io/vibebook/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: marketing-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
