# Auto-generated by `vibebook workflow init`. Edit if you want to change schedule
# or model — the file is yours to own once committed.
#
# NOTE: this template assumes `vibebook` is published to npm. If you're running
# from an unpublished fork, replace the install step with:
#   npm install -g <git-url>
# (e.g. `npm install -g github:youruser/vibebook`).

name: vibebook digest

on:
  push:
    # Trigger on every device branch — i.e. any push that ISN'T to main.
    # Each device pushes to its own branch (named after os.hostname()), and
    # this yaml only lives on those branches anyway, so "any non-main push"
    # is the right scope. Avoids hostname-glob whack-a-mole.
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: "Device branch to digest (default: caller's branch)"
        required: false
        default: ""

# Allow this workflow to use GitHub Models (read-only inference).
permissions:
  contents: write       # to push the book commit back
  models: read          # to call GitHub Models

concurrency:
  group: vibebook-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout device branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0      # need full history so digest can find prior book commits

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vibebook
        run: npm install -g vibebook

      - name: Write minimal config
        env:
          VIBEBOOK_PASSPHRASE: ${{ secrets.VIBEBOOK_PASSPHRASE }}
        run: |
          mkdir -p ~/.vibebook
          REPO_PATH="$PWD"
          ENCRYPT="$( [ -n "$VIBEBOOK_PASSPHRASE" ] && echo true || echo false )"
          # Salt is written by `vibebook init` (or `vibebook sync`'s self-heal)
          # to <repoPath>/.vibebook/repo-salt.json and committed. The salt is
          # not sensitive — security relies on the passphrase. Repos created
          # before the data-dir rename had it under .memvc/ — we read whichever
          # exists. jq is preinstalled on ubuntu-latest GH runners.
          SALT_FILE=""
          if [ -f "$REPO_PATH/.vibebook/repo-salt.json" ]; then
            SALT_FILE="$REPO_PATH/.vibebook/repo-salt.json"
          elif [ -f "$REPO_PATH/.memvc/repo-salt.json" ]; then
            SALT_FILE="$REPO_PATH/.memvc/repo-salt.json"
          fi
          if [ "$ENCRYPT" = "true" ] && [ -z "$SALT_FILE" ]; then
            echo "::warning::encryption is on (VIBEBOOK_PASSPHRASE secret set) but neither $REPO_PATH/.vibebook/repo-salt.json nor $REPO_PATH/.memvc/repo-salt.json exists in the checkout."
            echo "::warning::This usually means the device that pushed is on an old vibebook version. Run 'npm install -g vibebook@latest && vibebook sync' on that device to backfill the salt file."
            echo "::warning::Skipping digest for this push (workflow exits successfully so CI doesn't keep re-failing)."
            echo "VIBEBOOK_SKIP_DIGEST=1" >> "$GITHUB_ENV"
          fi
          SALT="$( [ -n "$SALT_FILE" ] && jq -r .salt "$SALT_FILE" || echo placeholder)"
          cat > ~/.vibebook/config.json <<JSON
          {
            "repoPath": "$REPO_PATH",
            "repoUrl": "${{ github.server_url }}/${{ github.repository }}.git",
            "encrypt": $ENCRYPT,
            "salt": "$SALT",
            "deviceBranch": "${{ inputs.branch || github.ref_name }}",
            "runner": "github-action",
            "runnerModel": "__VIBEBOOK_RUNNER_MODEL__",
            "threadingConcurrency": 1,
            "threadingMaxAttempts": 3,
            "digestEnabled": true
          }
          JSON
          if [ -n "$VIBEBOOK_PASSPHRASE" ]; then
            echo "$VIBEBOOK_PASSPHRASE" > ~/.vibebook/passphrase
            chmod 600 ~/.vibebook/passphrase
          fi

      - name: Configure git identity
        # Required by `vibebook digest` (which makes a commit when the digest
        # produces changes) AND by the final `git push` step. Set once here
        # so any commit-producing step downstream just works.
        run: |
          git config user.name  "vibebook-bot"
          git config user.email "vibebook-bot@users.noreply.github.com"

      - name: Run digest
        if: env.VIBEBOOK_SKIP_DIGEST != '1'
        env:
          VIBEBOOK_CI: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `vibebook digest` (no flag) runs the digest pipeline over the
        # checkout's existing index.json + book index. We skip extract
        # (no local ~/.claude/ in CI). Use --redo only if you need to
        # retry previously-failed articles.
        #
        # ⚠ EXPERIMENTAL: GitHub Models free tier caps every request at
        # 8000 input / 4000 output tokens. Long threads get truncated and
        # some articles may fail. For high-quality digests, run
        # `vibebook sync` locally with the claude-cli runner instead.
        run: |
          echo "::warning::GitHub Action digest runs against GitHub Models free tier (8K input cap). Long articles may be truncated or fail. For best quality, run 'vibebook sync' locally with claude-cli."
          vibebook digest

      - name: Push book commit
        if: env.VIBEBOOK_SKIP_DIGEST != '1'
        run: git push origin HEAD:${{ inputs.branch || github.ref_name }}
