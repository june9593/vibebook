# Auto-generated by `vibebook workflow init`. Edit freely once committed.
#
# Purpose: aggregate every device branch's book/ into main. The LLM work
# (chronicle/topics/cards writing) happens LOCALLY on each device via
# `vibebook sync`. This workflow never calls an LLM — it just does a
# deterministic merge so `main` shows a unified view across all your devices.
#
# Triggers on push to ANY branch except main. The script is bundled in
# this repo at scripts/merge-books.mjs (written by `vibebook workflow init`).

name: vibebook aggregate book

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: write       # push merged book/ to main

concurrency:
  group: vibebook-aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main (orphan if missing)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
        continue-on-error: true

      - name: Ensure main branch exists
        run: |
          if ! git rev-parse --verify main >/dev/null 2>&1; then
            git checkout --orphan main
            git rm -rf . 2>/dev/null || true
            git commit --allow-empty -m "vibebook: initialize main branch"
          else
            git checkout main
          fi

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git identity
        run: |
          git config user.name  "vibebook-bot"
          git config user.email "vibebook-bot@users.noreply.github.com"

      - name: Aggregate device books into main
        run: node scripts/merge-books.mjs

      - name: Push main
        run: git push origin HEAD:main
