name: vibebook · publish site to GitHub Pages

# Build the static vibebook site and publish it to GitHub Pages on every
# push to main. The site is generated from the BookIndex + book/ markdown
# in this repo — exactly what `vibebook build-site` does locally.
#
# Setup steps for a fresh repo:
#   1. Settings → Pages → Source: GitHub Actions
#   2. Push this workflow to main; the first run produces the site.
#
# The workflow fetches vibebook from npm (latest @0.x). If you've forked
# vibebook itself or want to pin a version, edit the `npm install` line
# below.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install vibebook (latest 0.x)
        run: npm install -g vibebook@^0.2

      - name: Write minimal vibebook config (CI mode, no remote)
        run: |
          mkdir -p ~/.vibebook
          cat > ~/.vibebook/config.json <<EOF
          {
            "repoPath": "${GITHUB_WORKSPACE}",
            "repoUrl": "",
            "deviceBranch": "ci",
            "runner": "claude-cli",
            "enableAggregateCI": false,
            "includeReasoning": true,
            "threadingConcurrency": 1,
            "threadingMaxAttempts": 1,
            "digestEnabled": false
          }
          EOF

      - name: Build site
        env:
          # GitHub Pages serves project sites at /<repo>/. We pass that as
          # the base URL so all internal links resolve correctly.
          VIBEBOOK_PAGES_BASE: /${{ github.event.repository.name }}/
          VIBEBOOK_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          vibebook build-site \
            --base "${VIBEBOOK_PAGES_BASE}" \
            --site-url "${VIBEBOOK_PAGES_URL}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
